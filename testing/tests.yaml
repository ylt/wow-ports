# Test Manifest — Ground Truth from Lua Reference Implementations
# Lua is the reference. All languages must pass these identically.
# Input types: byte={type:byte,value:N}, bytes={type:bytes,values:[...]},
#   infinity={type:infinity}, neg_infinity={type:neg_infinity}
# Test types: serialize_contains, serialize_equals, serialize_contains_all,
#   serialize_contains_any, serialize_count, deserialize_equals, roundtrip,
#   roundtrip_keys, roundtrip_multi, roundtrip_empty, framing, error

ace_serializer:
- id: A1
  section: A. String Escaping
  description: NUL (0x00) → ~@
  type: serialize_contains
  input:
    type: byte
    value: 0
  contains: ~@
- id: A2a
  section: A. String Escaping
  description: control 0x01 → ~A
  type: serialize_contains
  input:
    type: byte
    value: 1
  contains: ~A
- id: A2b
  section: A. String Escaping
  description: control 0x0A (LF) → ~J
  type: serialize_contains
  input:
    type: byte
    value: 10
  contains: ~J
- id: A2c
  section: A. String Escaping
  description: control 0x1D → ~]
  type: serialize_contains
  input:
    type: byte
    value: 29
  contains: ~]
- id: A3
  section: A. String Escaping
  description: byte 30 (0x1E) → ~z (special case)
  type: serialize_contains
  input:
    type: byte
    value: 30
  contains: ~z
- id: A4
  section: A. String Escaping
  description: byte 31 (0x1F) → ~_
  type: serialize_contains
  input:
    type: byte
    value: 31
  contains: ~_
- id: A5
  section: A. String Escaping
  description: space (0x20) → ~`
  type: serialize_contains
  input: ' '
  contains: ~`
- id: A6
  section: A. String Escaping
  description: caret ^ (0x5E) → ~}
  type: serialize_contains
  input: ^
  contains: ~}
- id: A7
  section: A. String Escaping
  description: tilde ~ (0x7E) → ~|
  type: serialize_contains
  input: '~'
  contains: ~|
- id: A8
  section: A. String Escaping
  description: DEL (0x7F) → ~{
  type: serialize_contains
  input:
    type: byte
    value: 127
  contains: ~{
- id: A9
  section: A. String Escaping
  description: single-pass — no double-escaping
  type: serialize_contains_all
  input:
    type: bytes
    values:
    - 94
    - 126
    - 127
  contains:
