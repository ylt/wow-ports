# L2. Fixture Wire-Format Tests — exact serialize/deserialize with known wire strings
- id: L74
  section: L2. Fixture Wire-Format Tests
  description: simple array of two strings — exact wire
  type: serialize_equals
  input:
    '1': a
    '2': b
  expected: "^1^T^N1^Sa^N2^Sb^t^^"
- id: L75
  section: L2. Fixture Wire-Format Tests
  description: simple array of two strings — deserialize
  type: deserialize_equals
  wire: "^1^T^N1^Sa^N2^Sb^t^^"
  expected:
    '1': a
    '2': b
- id: L76
  section: L2. Fixture Wire-Format Tests
  description: array of three mixed values — exact wire
  type: serialize_equals
  input:
    '1': hello
    '2': 42
    '3': true
  expected: "^1^T^N1^Shello^N2^N42^N3^B^t^^"
- id: L77
  section: L2. Fixture Wire-Format Tests
  description: array of three mixed values — deserialize
  type: deserialize_equals
  wire: "^1^T^N1^Shello^N2^N42^N3^B^t^^"
  expected:
    '1': hello
    '2': 42
    '3': true
- id: L78
  section: L2. Fixture Wire-Format Tests
  description: nested array — exact wire
  type: serialize_equals
  input:
    '1':
      '1': a
      '2': b
    '2': c
  expected: "^1^T^N1^T^N1^Sa^N2^Sb^t^N2^Sc^t^^"
- id: L79
  section: L2. Fixture Wire-Format Tests
  description: nested array — deserialize
  type: deserialize_equals
  wire: "^1^T^N1^T^N1^Sa^N2^Sb^t^N2^Sc^t^^"
  expected:
    '1':
      '1': a
      '2': b
    '2': c
- id: L80
  section: L2. Fixture Wire-Format Tests
  description: array with null values — exact wire
  type: serialize_equals
  input:
    '1': null
    '2': null
    '3': null
    '4': test
  expected: "^1^T^N1^Z^N2^Z^N3^Z^N4^Stest^t^^"
- id: L81
  section: L2. Fixture Wire-Format Tests
  description: array with null values — deserialize
  type: deserialize_equals
  wire: "^1^T^N1^Z^N2^Z^N3^Z^N4^Stest^t^^"
  expected:
    '1': null
    '2': null
    '3': null
    '4': test
- id: L82
  section: L2. Fixture Wire-Format Tests
  description: nested structure from protocol spec — deserialize only
  type: deserialize_equals
  wire: "^1^T^Shello^Sworld^Stest^N123^Snested^T^N1^Z^N2^Z^N3^Z^N4^Stest^t^t^^"
  expected:
    hello: world
    test: 123
    nested:
      '1': null
      '2': null
      '3': null
      '4': test
- id: L83
  section: L2. Fixture Wire-Format Tests
  description: mixed table string and integer keys — deserialize only
  type: deserialize_equals
  wire: "^1^T^Shello^Sworld^Sn^N42^t^^"
  expected:
    hello: world
    n: 42

# M. Float wire format consistency (review finding: MEDIUM — %.14g vs String())
- id: M84
  section: M. Float wire format consistency
  description: 3.14 uses ^N path (not ^F)
  type: serialize_contains
  input: 3.14
  contains: ^N3.14

- id: M85
  section: M. Float wire format consistency
  description: very small float 1e-10 uses ^N path
  type: serialize_contains
  input: 1.0e-10
  contains: ^N

- id: M86
  section: M. Float wire format consistency
  description: 0.5 uses ^N path
  type: serialize_contains
  input: 0.5
  contains: ^N0.5

- id: M87
  section: M. Float wire format consistency
  description: extreme float 2.2250738585072014e-308 round-trips correctly
  type: roundtrip
  input: 2.2250738585072014e-308

- id: M88
  section: M. Float wire format consistency
  description: extreme float 2.2250738585072014e-308 uses ^F path (%.14g loses precision)
  type: serialize_contains
  input: 2.2250738585072014e-308
  contains: ^F

# N. Escape edge cases (review finding: MEDIUM — invalid escape handling)
- id: N88a
  section: N. Escape edge cases
  description: invalid escape ~> (ord 62, would produce negative byte) is rejected
  type: error
  wire: "^1^S~>^^"

- id: N88b
  section: N. Escape edge cases
  description: invalid escape ~# (ord 35, would produce negative byte) is rejected
  type: error
  wire: "^1^S~#^^"

- id: N88c
  section: N. Escape edge cases
  description: all control bytes 0x01-0x1D round-trip correctly
